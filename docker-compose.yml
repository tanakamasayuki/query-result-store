x-qrs-env: &qrs-env
   TZ: Asia/Tokyo
   QRS_TIMEZONE: Asia/Tokyo
   QRS_DB_DRIVER: sqlite
   QRS_DB_SQLITE_PATH: /var/www/html/var/qrs.sqlite3
   QRS_DB_HOST: 127.0.0.1
   QRS_DB_PORT: ""
   QRS_DB_NAME: qrs
   QRS_DB_USER: ""
   QRS_DB_PASSWORD: ""
   QRS_DB_CHARSET: utf8
   APACHE_RUN_USER: "#${UID:-1000}"
   APACHE_RUN_GROUP: "#${GID:-1000}"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      <<: *qrs-env
    volumes:
      - ./:/var/www/html

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *qrs-env
      WORKER_LOOP_SECONDS: "15"
    volumes:
      - ./:/var/www/html
    command: >
      bash -lc 'while true; do
        php /var/www/html/bin/worker.php;
        sleep $${WORKER_LOOP_SECONDS:-15};
      done'
    restart: unless-stopped
